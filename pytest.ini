[pytest]
addopts = -v --html=reports/sp_automation_report.html --self-contained-html --tb=short
log_level = WARNING
log_cli_level = WARNING
pythonpath = .
python_files = test_*.py
norecursedirs = tests/helpers
# suppress collection warnings for enums or other classes with custom __new__
filterwarnings =
    ignore::pytest.PytestCollectionWarning
# Parallel execution: use 'pytest -n auto' to run with auto-detected workers
# For CI/CD: pytest -n 2 (or set CI=true environment variable)
