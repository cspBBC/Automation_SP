# Test Configuration
# This file contains test execution settings for the framework

test:
  # Data source for tests (can be JSON, CSV, or Excel)
  data_source: data_layer/test_data/createSchdGroup_testData.json
  
  # Test execution settings
  timeout: 30
  retry_count: 0
  
  # Test case settings
  parallel_execution: false
  max_workers: 4
  
  # Validation settings
  skip_validation: false
  strict_validation: true
  
  # Logging settings
  log_level: INFO
  log_file: output/test_execution.log
  
  # Report settings
  generate_report: true
  report_format: json
  
  # Advanced settings
  stop_on_first_failure: false
  capture_output: true
  cleanup_after_test: true
