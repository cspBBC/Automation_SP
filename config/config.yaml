# Comprehensive Test Framework Configuration
# Combines database and test settings for complete test orchestration

database:
  # Database connection (use environment variables for sensitive data)
  host: ${DB_HOST}
  name: ${DB_NAME}
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  
  # Connection pool settings
  pool_size: 10
  pool_timeout: 30
  
  # Transaction settings
  isolation_level: READ_COMMITTED
  
  # ODBC settings
  driver: ODBC Driver 17 for SQL Server
  encrypt: true
  trust_certificate: false

test:
  # Data source for tests (JSON, CSV, or Excel)
  data_source: data_layer/test_data/createSchdGroup_testData.json
  
  # Execution settings
  timeout: 30
  retry_count: 0
  parallel_execution: false
  max_workers: 4
  
  # Validation settings
  skip_validation: false
  strict_validation: true
  
  # Logging
  log_level: INFO
  log_file: output/test_execution.log
  
  # Reporting
  generate_report: true
  report_format: json
  
  # Advanced
  stop_on_first_failure: false
  capture_output: true
  cleanup_after_test: true
